openapi: 3.1.0
info:
  title: LuxLedger API
  version: 0.2.0
  description: Reference REST API built on top of @luxledger/core.
servers:
  - url: http://localhost:3000
security:
  - BearerAuth: []
paths:
  /openapi.yaml:
    get:
      summary: OpenAPI specification
      security: []
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
  /docs:
    get:
      summary: Swagger UI
      security: []
      responses:
        '200':
          description: Swagger UI HTML page
          content:
            text/html:
              schema:
                type: string
  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      responses:
        '200':
          description: Prometheus text exposition format
          content:
            text/plain:
              schema:
                type: string
  /health:
    get:
      summary: Health check
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /ready:
    get:
      summary: Readiness check
      security: []
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        '503':
          $ref: '#/components/responses/NotReadyError'
  /v1/auth/token:
    post:
      summary: Exchange API key for short-lived access token
      description: Requires a non-revoked API key. Access tokens default to 900 seconds, must stay within 300-900 seconds, and are rejected on the next authenticated request after the backing API key is revoked.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/ledgers:
    post:
      summary: Create ledger
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLedgerRequest'
      responses:
        '201':
          description: Ledger created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ledger'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    get:
      summary: List tenant ledgers
      responses:
        '200':
          description: Tenant ledgers
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgersListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/ledgers/{id}:
    get:
      summary: Get ledger by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ledger
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ledger'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/transactions:
    post:
      summary: Create transaction (idempotent by tenant+reference)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTransactionRequest'
      responses:
        '201':
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
        '200':
          description: Idempotent retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    get:
      summary: List transactions
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/LedgerIdQuery'
      responses:
        '200':
          description: Transaction page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionsPage'
              examples:
                default:
                  value:
                    data:
                      - id: 00000000-0000-4000-8000-000000000201
                        tenant_id: 11111111-1111-4111-8111-111111111111
                        ledger_id: 00000000-0000-4000-8000-000000000001
                        reference: tx-ref-1
                        currency: USD
                        description: Payment settlement
                        related_transaction_id: null
                        relation_type: null
                        effective_at: '2026-01-01T00:01:00.000Z'
                        created_at: '2026-01-01T00:01:00.000Z'
                    next_cursor: eyJjcmVhdGVkX2F0IjoiMjAyNi0wMS0wMVQwMDowMTowMC4wMDBaIiwiaWQiOiIwMDAwMDAwMC0wMDAwLTQwMDAtODAwMC0wMDAwMDAwMDAyMDEifQ
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/transactions/bulk:
    post:
      summary: Create transactions in an all-or-nothing bulk posting
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateTransactionRequest'
      responses:
        '201':
          description: At least one transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCreateTransactionResponse'
        '200':
          description: Idempotent retry of all transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkCreateTransactionResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/transactions/{id}:
    get:
      summary: Get transaction by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transaction'
              examples:
                found:
                  value:
                    id: 00000000-0000-4000-8000-000000000201
                    tenant_id: 11111111-1111-4111-8111-111111111111
                    ledger_id: 00000000-0000-4000-8000-000000000001
                    reference: tx-ref-1
                    currency: USD
                    description: Payment settlement
                    related_transaction_id: null
                    relation_type: null
                    created_at: '2026-01-01T00:01:00.000Z'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/transactions/{id}/reverse:
    post:
      summary: Reverse transaction (idempotent by tenant+reference)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReverseTransactionRequest'
            examples:
              default:
                value:
                  reference: tx-ref-1-reversal
                  description: Reverse invalid posting
      responses:
        '201':
          description: Reversal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
        '200':
          description: Idempotent retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTransactionResponse'
  /v1/transactions/{id}/correct:
    post:
      summary: Correct transaction by creating reversal + replacement (atomic, idempotent)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CorrectTransactionRequest'
            examples:
              default:
                value:
                  reversal_reference: tx-ref-1-reversal
                  corrected_reference: tx-ref-1-corrected
                  description: Correct account allocation
                  entries:
                    - account_id: 00000000-0000-4000-8000-000000000101
                      direction: DEBIT
                      amount_minor: '100'
                      currency: USD
                    - account_id: 00000000-0000-4000-8000-000000000102
                      direction: CREDIT
                      amount_minor: '100'
                      currency: USD
      responses:
        '201':
          description: Correction flow created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectTransactionResponse'
        '200':
          description: Idempotent retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CorrectTransactionResponse'
  /v1/accounts:
    post:
      summary: Create account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
    get:
      summary: List accounts
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/LedgerIdQuery'
      responses:
        '200':
          description: Account page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountsPage'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/accounts/{id}:
    get:
      summary: Get account by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/accounts/{id}/balance-as-of:
    get:
      summary: Get account balance as of a timestamp
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: at
          required: true
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Historical account balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceAsOfResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/accounts/{id}/balance-history:
    get:
      summary: List account balance history
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          required: true
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: true
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Account balance history page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BalanceHistoryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/holds:
    post:
      summary: Create a funds hold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHoldRequest'
      responses:
        '201':
          description: Hold created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateHoldResponse'
        '200':
          description: Idempotent retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateHoldResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/holds/{id}/commit:
    post:
      summary: Commit all or part of a hold
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitHoldRequest'
      responses:
        '201':
          description: Hold commit created a transaction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitHoldResponse'
        '200':
          description: Idempotent retry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitHoldResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /v1/holds/{id}/void:
    post:
      summary: Void the remaining amount of a hold
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Hold voided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoidHoldResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '409':
          $ref: '#/components/responses/ConflictError'
  /v1/entries:
    get:
      summary: List entries
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Cursor'
      responses:
        '200':
          description: Entry page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntriesPage'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/ledgers/{ledger_id}/trial-balance:
    get:
      summary: Get trial balance
      parameters:
        - in: path
          name: ledger_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Trial balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrialBalanceResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
  /v1/admin/api-keys:
    get:
      summary: List API keys (admin only)
      responses:
        '200':
          description: API key list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeysListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
    post:
      summary: Create API key (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
      responses:
        '201':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateApiKeyResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /v1/admin/api-keys/{id}/revoke:
    post:
      summary: Revoke API key (admin only)
      parameters:
        - $ref: '#/components/parameters/ApiKeyIdPath'
      responses:
        '204':
          description: API key revoked
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
  /v1/reconciliation/matching-rules:
    post:
      summary: Create reconciliation matching rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReconciliationMatchingRuleRequest'
      responses:
        '201':
          description: Matching rule created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationMatchingRule'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    get:
      summary: List reconciliation matching rules
      responses:
        '200':
          description: Matching rules
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ReconciliationMatchingRule'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/reconciliation/external-records:
    post:
      summary: Ingest external reconciliation records
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestExternalRecordsRequest'
      responses:
        '201':
          description: External records accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalRecordsUpload'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/reconciliation/runs:
    post:
      summary: Run baseline reconciliation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RunReconciliationRequest'
      responses:
        '201':
          description: Reconciliation run persisted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationRun'
        '200':
          description: Dry-run report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationRun'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /v1/reconciliation/runs/{id}:
    get:
      summary: Get reconciliation run report
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reconciliation run
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationRun'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      required: false
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        minLength: 1
      required: false
    LedgerIdQuery:
      name: ledger_id
      in: query
      schema:
        type: string
        format: uuid
      required: false
    ApiKeyIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  responses:
    BadRequestError:
      description: Invalid input
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ConflictError:
      description: Request conflicts with current resource state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotReadyError:
      description: Service not ready
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
    AuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          const: Bearer
        expires_in:
          type: integer
          minimum: 300
          maximum: 900
          default: 900
          description: Access token TTL in seconds. Default is 900.
    CreateApiKeyRequest:
      type: object
      additionalProperties: false
      required: [name, role]
      properties:
        name:
          type: string
          pattern: '^(?=.*\S).+$'
        role:
          type: string
          enum: [ADMIN, SERVICE]
    Ledger:
      type: object
      required: [id, tenantId, name, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    LedgersListResponse:
      type: array
      items:
        $ref: '#/components/schemas/Ledger'
    CreateLedgerRequest:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
          pattern: '^(?=.*\S).+$'
    TransactionEntryRequest:
      type: object
      additionalProperties: false
      required: [account_id, direction, amount_minor, currency]
      properties:
        account_id:
          type: string
          format: uuid
        direction:
          type: string
          enum: [DEBIT, CREDIT]
        amount_minor:
          type: string
          pattern: '^[1-9][0-9]*$'
        currency:
          type: string
          pattern: '^(?=.*\S).+$'
    CreateTransactionRequest:
      type: object
      additionalProperties: false
      required: [ledger_id, reference, currency, entries]
      properties:
        ledger_id:
          type: string
          format: uuid
        reference:
          type: string
          pattern: '^(?=.*\S).+$'
        currency:
          type: string
          pattern: '^(?=.*\S).+$'
        description:
          type: string
          pattern: '^(?=.*\S).+$'
          description: Optional transaction description. When omitted it is stored as null.
        effective_at:
          type: string
          format: date-time
          description: Optional accounting effective timestamp for backdated postings.
        entries:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/TransactionEntryRequest'
    BulkCreateTransactionRequest:
      type: object
      additionalProperties: false
      required: [transactions]
      properties:
        transactions:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/CreateTransactionRequest'
    CreateTransactionResponse:
      type: object
      additionalProperties: false
      required: [transaction_id, created]
      properties:
        transaction_id:
          type: string
          format: uuid
        created:
          type: boolean
    BulkCreateTransactionResponse:
      type: object
      additionalProperties: false
      required: [created_count, idempotent_count, transactions]
      properties:
        created_count:
          type: integer
          minimum: 0
        idempotent_count:
          type: integer
